<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PedZINC Plus C — Video/Static Rotation Preview</title>
<style>
  :root {
    --ph:#e8eaed; --ph-bd:#dadde1; --ph-label:#a3a7ad;
    --line1:#23a0d8; --line2:#1565b0;
    --sans:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; background:#fff; font-family:var(--sans); color:#222; }
  .page { max-width:1010px; margin:0 auto; padding:22px 26px 90px; position:relative; }
  .top { display:flex; align-items:center; gap:26px; }
  .logo { display:flex; align-items:center; gap:9px; flex:none; }
  .logo .mark { width:34px; height:34px; }
  .logo .name { line-height:1; }
  .logo .name .a { font-size:21px; font-weight:700; color:#15355f; letter-spacing:-.3px; }
  .logo .name .d { display:block; font-size:9.5px; font-weight:600; letter-spacing:5px; color:#5b6675; margin-top:2px; }
  .lb { flex:1; display:flex; justify-content:center; }
  .ph { background:var(--ph); border:1px solid var(--ph-bd); display:flex; align-items:center; justify-content:center;
        color:var(--ph-label); font-size:13px; font-weight:500; }
  .lb .ph { width:728px; max-width:100%; height:90px; }
  .divider { height:3px; background:linear-gradient(90deg,var(--line1),var(--line2)); margin:18px 0 22px; border-radius:2px; }
  .grid { display:grid; grid-template-columns:640px 1fr; gap:30px; align-items:start; }
  .main { width:640px; max-width:100%; }
  .teaser { display:flex; gap:18px; }
  .teaser .thumb { width:120px; height:84px; background:var(--ph); border:1px solid var(--ph-bd); flex:none; }
  .lines { flex:1; display:flex; flex-direction:column; gap:10px; padding-top:4px; }
  .bar { height:9px; background:#e6e9ed; border-radius:4px; }
  .bar.w1{width:96%} .bar.w2{width:90%} .bar.w3{width:70%} .bar.w4{width:55%}
  .squares { display:flex; gap:9px; margin:16px 0 18px; }
  .squares span { width:22px; height:22px; background:var(--ph); border:1px solid var(--ph-bd); }
  .video { width:100%; height:360px; }
  .rail .rect { width:300px; height:250px; }
  .lower { display:flex; gap:18px; margin-top:22px; }
  .lower .col { flex:1; }
  .lower .imgph { width:100%; height:120px; background:var(--ph); border:1px solid var(--ph-bd); margin-bottom:10px; }

  .floatad { position:fixed; right:14px; bottom:12px; width:480px; max-width:calc(100vw - 28px);
             height:114px; overflow:hidden; z-index:50; border-radius:3px; background:#000; cursor:pointer;
             box-shadow:0 4px 18px rgba(0,0,0,.22); transition:height .5s cubic-bezier(.4,0,.2,1); }
  .floatad .asset { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:none; }
  .floatad #fv-vid { background:#000; }
  .floatad .overlay { position:absolute; }
  .floatad .adtag { top:0; left:0; z-index:6; background:rgba(0,0,0,.45); color:#fff; font-size:8px; letter-spacing:.5px;
             padding:1px 5px; text-transform:uppercase; }
  .floatad .ctrl { top:0; right:0; z-index:8; display:flex; gap:1px; }
  .floatad .ctrl button { min-width:22px; height:18px; border:none; cursor:pointer; font-size:11px; line-height:1;
             background:rgba(0,0,0,.55); color:#fff; padding:0 4px; }
  .floatad .hint { inset:0; display:flex; align-items:center; justify-content:center; color:#cfd4da;
             font-size:12px; pointer-events:none; z-index:4; }
  .floatad .tap { left:0; right:0; bottom:8px; z-index:7; display:flex; justify-content:center; pointer-events:none; }
  .floatad .tap button { pointer-events:auto; background:rgba(0,0,0,.72); color:#fff; border:none; border-radius:20px;
             font-size:12px; padding:6px 14px; cursor:pointer; }
  @media(max-width:980px){ .grid{grid-template-columns:1fr} .main{width:100%} .lb .ph{height:70px} }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="logo">
      <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 6 A44 44 0 0 1 94 50 A44 44 0 0 1 50 94 A30 30 0 0 0 50 34 A22 22 0 0 1 50 6 Z" fill="#1f7fc4"/>
        <path d="M50 94 A44 44 0 0 1 6 50 A44 44 0 0 1 50 6 A30 30 0 0 0 50 66 A22 22 0 0 1 50 94 Z" fill="#27a9dd"/>
      </svg>
      <span class="name"><span class="a">ambient</span><span class="d">DIGITAL</span></span>
    </div>
    <div class="lb"><div class="ph">728x90</div></div>
  </div>
  <div class="divider"></div>
  <div class="grid">
    <div class="main">
      <div class="teaser">
        <div class="thumb"></div>
        <div class="lines"><div class="bar w1"></div><div class="bar w2"></div><div class="bar w3"></div><div class="bar w4"></div></div>
      </div>
      <div class="squares"><span></span><span></span><span></span></div>
      <div class="ph video">640x360</div>
      <div class="lower">
        <div class="col"><div class="imgph"></div><div class="bar w1" style="margin-bottom:8px"></div><div class="bar w3"></div></div>
        <div class="col"><div class="imgph"></div><div class="bar w1" style="margin-bottom:8px"></div><div class="bar w3"></div></div>
      </div>
    </div>
    <div class="rail"><div class="ph rect">300x250</div></div>
  </div>
</div>

<!-- Click-through landing page for the whole unit -->
<div class="floatad" id="fv-unit" title="Visit PedZINC Plus C">
  <span class="overlay adtag">Ad</span>
  <div class="overlay ctrl">
    <button id="fv-sound" title="Turn sound on">&#128263;</button>
    <button id="fv-close" title="Close">&times;</button>
  </div>
  <span class="hint" id="fv-hint">Loading video&hellip;</span>
  <div class="overlay tap" id="fv-tap"><button type="button">&#128266; Tap for sound</button></div>
  <video class="asset" id="fv-vid" muted playsinline preload="auto">
    <source src="Pedzinc%20Hole%20in%20the%20wall%2015s.mp4" type="video/mp4">
  </video>
  <img class="asset" id="fv-stat" src="_300x71.png" alt="PedZINC Plus C horizontal static">
</div>

<script>
(function(){
  var CLICK_URL='https://www.facebook.com/pedzincplusc'; // landing page

  var unit=document.getElementById('fv-unit'),
      vid=document.getElementById('fv-vid'),
      stat=document.getElementById('fv-stat'),
      hint=document.getElementById('fv-hint'),
      tap=document.getElementById('fv-tap'),
      soundBtn=document.getElementById('fv-sound'),
      closeBtn=document.getElementById('fv-close');

  var STATIC_MS=4000, FALLBACK_VID_MS=6000, SLIDE_MS=600;
  var statRatio=452/1910, vidRatio=9/16, token=0, timer=null;
  var wantSound=false;
  var MUTE='\uD83D\uDD07', SOUND='\uD83D\uDD0A';
  function clearT(){ if(timer){clearTimeout(timer);timer=null;} }

  function slideIn(el, ratio){
    var other=(el===vid)?stat:vid;
    el.style.transition='none'; el.style.transform='translateY(110%)';
    el.style.display='block'; el.style.zIndex=2; other.style.zIndex=1;
    unit.style.height=(unit.clientWidth*ratio)+'px';
    void el.offsetHeight;
    el.style.transition='transform '+SLIDE_MS+'ms cubic-bezier(.22,.61,.36,1)';
    el.style.transform='translateY(0)';
    setTimeout(function(){ other.style.display='none'; }, SLIDE_MS);
  }

  function enableSound(){
    wantSound=true; vid.muted=false; vid.volume=1;
    var p=vid.play(); if(p&&p.catch){p.catch(function(){});}
    soundBtn.innerHTML=SOUND; soundBtn.title='Mute';
    tap.style.display='none';
  }

  function videoPhase(){
    var my=++token; clearT(); hint.style.display='';
    slideIn(vid, vidRatio);
    vid.muted=!wantSound;
    tap.style.display = wantSound ? 'none' : 'flex';
    try{ vid.currentTime=0; }catch(e){}
    var p=vid.play(); if(p&&p.catch){ p.catch(function(){}); }
    vid.onended=function(){ if(my===token) staticPhase(); };
    function arm(){ if(my!==token)return; clearT();
      var dur=(isFinite(vid.duration)&&vid.duration>0)?(vid.duration*1000+300):FALLBACK_VID_MS;
      timer=setTimeout(function(){ if(my===token) staticPhase(); }, dur); }
    arm();
    vid.onloadedmetadata=function(){ if(vid.videoWidth){ vidRatio=vid.videoHeight/vid.videoWidth;
      unit.style.height=(unit.clientWidth*vidRatio)+'px'; } arm(); };
  }
  vid.addEventListener('playing', function(){ hint.style.display='none'; });

  function staticPhase(){
    var my=++token; clearT(); slideIn(stat, statRatio);
    tap.style.display='none';
    timer=setTimeout(function(){ if(my===token) videoPhase(); }, STATIC_MS);
  }

  // tap-for-sound (does not navigate)
  tap.querySelector('button').addEventListener('click', function(e){ e.stopPropagation(); enableSound(); });

  // corner sound toggle (does not navigate)
  soundBtn.addEventListener('click', function(e){
    e.stopPropagation();
    if(!wantSound){ enableSound(); }
    else { wantSound=false; vid.muted=true; soundBtn.innerHTML=MUTE; soundBtn.title='Turn sound on'; }
  });

  // close (does not navigate)
  closeBtn.addEventListener('click', function(e){ e.stopPropagation(); unit.style.display='none'; clearT(); try{vid.pause();}catch(err){} });

  // click-through on the creative -> landing page
  unit.addEventListener('click', function(e){
    if(e.target.closest('.ctrl') || e.target.closest('#fv-tap')) return;
    window.open(CLICK_URL, '_blank', 'noopener');
  });

  videoPhase();
})();
</script>
</body>
</html>
